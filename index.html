  <!-- faye-browser: CometD client for cross-origin Salesforce Streaming API.
       No AMD workaround needed here — unlike the VF page, there is no Salesforce
       framework setting up window.define, so faye sets window.Faye as a global directly. -->
  <script>
    // Faye uses a UMD bundle: if window.define exists (AMD) it registers as a module
    // instead of setting window.Faye.  Clear define before loading so Faye takes the
    // global path, then restore it (same pattern as the VF page).
    window._savedDefine = window.define;
    window.define = undefined;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/faye@1.4.0/browser/faye-browser.min.js"
          onerror="console.error('[Faye] ❌ Script failed to load from CDN — check network/CSP.')"></script>
  <script>
    window.define = window._savedDefine;
    delete window._savedDefine;
    console.log('[Faye] load check:', typeof window.Faye !== 'undefined' ? '✅ window.Faye ready' : '❌ window.Faye is UNDEFINED — CometD streaming will be unavailable');
  </script>

  <script>
    let lightningEndpoint = '';
    let tokenUrl = '';
    let jwtToken = '';
    let appName = '';
    let componentName = '';
    const targetElement = document.querySelector('[data-lightning-out]');

    // Holds the active Faye CometD client used for streaming.
    // Torn down each time initializeLightningOut is called to avoid duplicate subscriptions.
    let _sfConn = null;

    function teardownCometD() {
      if (_sfConn) {
        try { _sfConn.streaming.disconnect(); } catch (e) { /* ignore */ }
        _sfConn = null;
      }
    }

    /**
     * Establishes a CometD streaming connection to the Salesforce org using an
     * OAuth Bearer token (no session cookie required, works cross-origin).
     * Subscribes to ChatMessageEvent__e and ChatTypingEvent__e, then injects each
     * arriving event into the component via the @api bridge methods.
     *
     * Prerequisite: the Salesforce org must have this page's origin in Setup → CORS.
     */
    function setupCometDStreaming(cmp, endpoint, token) {
      if (typeof Faye === 'undefined') {
        console.error('[CometD] ❌ window.Faye is undefined. Possible causes:\n' +
          '  1. The faye-browser CDN script failed to load (check Network tab for faye-browser.min.js).\n' +
          '  2. The AMD workaround (window.define = undefined) ran AFTER Faye loaded — check script order.\n' +
          '  3. The deployed page is missing the <script> tag for faye-browser entirely.\n' +
          'Real-time chat events will NOT be delivered until this is fixed.');
        showError('CometD streaming unavailable: faye-browser.min.js did not load. Check console for details.');
        return;
      }

      teardownCometD();

      // disable('websocket') must be called before the first subscribe().
      // Browsers cannot send Authorization headers in a WebSocket upgrade handshake,
      // so wss:// to Salesforce always fails cross-origin.
      // HTTP long-polling carries the Authorization: OAuth header without restriction.
      const client = new Faye.Client(endpoint + '/cometd/42.0');
      client.disable('websocket');
      client.setHeader('Authorization', 'OAuth ' + token);

      client.subscribe('/event/ChatMessageEvent__e', function(message) {
        try { cmp.injectChatEvent(message); }
        catch (e) { console.error('[CometD] injectChatEvent failed', e); }
      });

      client.subscribe('/event/ChatTypingEvent__e', function(message) {
        try { cmp.injectTypingEvent(message); }
        catch (e) { console.error('[CometD] injectTypingEvent failed', e); }
      });

      _sfConn = { streaming: { disconnect: function() { client.disconnect(); } } };
      console.log('[CometD] Streaming active (long-polling, no WebSocket) →', endpoint);
    }

    const redirectTypeSelector = document.getElementById('redirectTypeSelector');
    const idSelector = document.getElementById('idSelector');

    function toggleRecordSelector() {
      const needsRecordId = redirectTypeSelector.value !== 'ChatDrawer';
      idSelector.disabled = !needsRecordId;
      idSelector.style.opacity = needsRecordId ? '1' : '0.5';
    }

    toggleRecordSelector();
    redirectTypeSelector.addEventListener('change', toggleRecordSelector);

    document.getElementById('loadScriptButton').addEventListener('click', function() {
      const scriptSrc = document.getElementById('scriptSrc').value;
      lightningEndpoint = document.getElementById('lightningEndpoint').value;
      tokenUrl = document.getElementById('tokenUrl').value;
      jwtToken = document.getElementById('jwtToken').value;
      appName = document.getElementById('appName').value;
      componentName = document.getElementById('componentName').value;

      if (!scriptSrc || !lightningEndpoint || !tokenUrl || !jwtToken || !appName || !componentName) {
        alert('Please provide all required inputs.');
        return;
      }

      const script = document.createElement('script');
      script.src = scriptSrc;
      script.onload = function() {
        console.log('Lightning Out script loaded successfully.');
        document.getElementById('renderButton').disabled = false;
      };
      script.onerror = function() {
        console.error('Failed to load Lightning Out script. Check the script source URL.');
        showError('Failed to load Lightning Out script. Check the script source URL and CORS configuration.');
      };
      document.head.appendChild(script);
    });

    function initializeLightningOut(recordId, redirectType) {
      teardownCometD();
      targetElement.innerHTML = '';
      showError('');

      const token = jwtToken;
      if (!token) {
        showError('Access token is missing.');
        return;
      }

      const start = performance.now();
      console.log('[LO] init start', { recordId, redirectType, appName, componentName, lightningEndpoint });

      let useCallbackFired = false;
      const useTimeout = setTimeout(function() {
        if (!useCallbackFired) {
          console.error('[LO] $Lightning.use callback did NOT fire yet after 45s.');
          showError('$Lightning.use did not complete. Check Network for 302/401 and CORS. Likely scope/endpoint mismatch.');
        }
      }, 45000);

      try {
        $Lightning.use(
          appName,
          function() {
            useCallbackFired = true;
            clearTimeout(useTimeout);
            showError(''); // clear any false-positive timeout error

            console.log('[LO] $Lightning.use callback fired', { elapsedMs: Math.round(performance.now() - start) });

            const componentAttrs = { redirectType: redirectType };
            if (recordId) {
              componentAttrs.recordId = recordId;
            }

            $Lightning.createComponent(
              componentName,
              componentAttrs,
              targetElement,
              function(cmp) {
                console.log('[LO] createComponent callback fired', {
                  elapsedMs: Math.round(performance.now() - start),
                  cmpExists: !!cmp,
                  redirectType: redirectType
                });

                if (!cmp) {
                  showError('createComponent returned no component instance. Check console for Aura errors.');
                  return;
                }

                // Wire up real-time streaming for ChatDrawer via CometD + Bearer token.
                // This is the cross-origin alternative to lightning/empApi (which requires cookies).
                if (redirectType === 'ChatDrawer') {
                  setupCometDStreaming(cmp, lightningEndpoint, token);
                }
              }
            );
          },
          lightningEndpoint,
          token
        );
      } catch (e) {
        clearTimeout(useTimeout);
        console.error('[LO] Exception thrown calling $Lightning.use', e);
        showError('Exception calling $Lightning.use: ' + (e && e.message ? e.message : String(e)));
      }
    }

    function showError(msg) {
      const errorContainer = document.getElementById('errorContainer');
      if (errorContainer) {
        errorContainer.innerHTML = msg ? '<p style="color:red;">' + escapeHtml(msg) + '</p>' : '';
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    document.getElementById('renderButton').addEventListener('click', function() {
      const selectedRedirectType = redirectTypeSelector.value;
      const selectedId = selectedRedirectType === 'ChatDrawer' ? null : idSelector.value;
      initializeLightningOut(selectedId, selectedRedirectType);
    });

    window.addEventListener('lightningError', function(e) {
      const errorDetail = e.detail;
      console.error('Received lightningError event:', errorDetail);
      const errorContainer = document.getElementById('errorContainer');
      if (errorContainer) {
        errorContainer.innerHTML = '<p style="color:red;">Error: ' + escapeHtml((errorDetail && errorDetail.message) || 'Unknown error') + '</p>';
      }
    });
  </script>
